name: Validate Hugo Lessons

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'
      - 'validate_lesson.py'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'content/**/*.md'
      - 'validate_lesson.py'
      - '.github/workflows/validate.yml'

# Cancel in-flight runs on rapid pushes
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate_lesson.py
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python version supports tomllib
        run: |
          python3 --version
          python3 -c "import tomllib; print('tomllib OK')"

      - name: Run validator (default mode)
        # Hugo 콘텐츠 전체 검증 — WARN 허용 (info-only)
        run: |
          python3 validate_lesson.py --no-color

      - name: Run validator (strict mode, PR only)
        # PR/푸시에서 strict 모드로 한번 더 — 깨지면 빌드 실패
        if: github.event_name == 'pull_request'
        run: |
          python3 validate_lesson.py --strict --no-color --quiet || {
            echo "::error::validate_lesson.py --strict failed. 자세한 로그는 위 출력 참고."
            exit 1
          }

      - name: Upload validation report
        # 빌드 산출물로 JSON 리포트 보존 (30일)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}
          path: ../logs/validation_*.json
          retention-days: 30
          if-no-files-found: ignore